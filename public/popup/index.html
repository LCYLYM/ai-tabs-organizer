<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 标签页自动分类</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">AI Tabs</p>
      <h1>当前窗口状态</h1>
      <label class="toggle-row">
        <input id="auto-toggle" type="checkbox" />
        <span>自动打标</span>
      </label>
      <div id="summary" class="summary">正在加载...</div>
      <div class="button-column">
        <button id="scan-button" class="primary-button">一键打标当前窗口</button>
        <button id="rebuild-button" class="secondary-button">重建当前窗口分组</button>
        <button id="clear-button" class="secondary-button">清除所有分组/记录</button>
        <button id="settings-button" class="secondary-button">打开设置</button>
      </div>
      <pre id="result-output" class="result-box">等待操作。</pre>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
